<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Easy Store</title>
<script>
  // Save full path+search and redirect to index.html to handle routing
  const path = window.location.pathname + window.location.search;
  sessionStorage.setItem('es_redirect', path);
  window.location.replace('/');
</script>
</head>
